  <div class="card-header d-flex justify-content-between align-items-center">
    <h5 class="mb-0">Quản lý sản phẩm</h5>
  </div>

  <div class="card-body">
    <form *ngIf="formSearch" [formGroup]="formSearch" (ngSubmit)="getData()">
      <div class="row">
        <div class="col-md-6 mb-3">
          <label for="tenGoiTap" class="form-label">Tên Sản phẩm</label>
          <input
            type="text"
            class="form-control"
            formControlName="tenGoiTap"
            placeholder="Tên Sản phẩm"
            required
          />
        </div>

        <div class="col-md-6 mb-3">
          <label for="gia" class="form-label">Giá</label>
          <input-moneny type="text" formControlName="gia" />
        </div>
      </div>

      <div class="list-button">
        <button
          nz-button
          type="button"
          class="btn btn-primary btn-search"
          (click)="getData()"
        >
          <i nz-icon nzType="search" nzTheme="outline"></i>Tìm kiếm
        </button>

        <button
          nz-button
          type="button"
          class="btn btn-primary btn-search"
          (click)="onReset()"
        >
          <i nz-icon nzType="reload" nzTheme="outline"></i>Làm mới
        </button>
      </div>
    </form>
  </div>

  <div class="user-bg" *ngIf="this.isAdmin()">
    <div class="mb-4">
      <div class="data-table">
        <div class="hearder-table mt-m-15">
          <nz-tabset (nzSelectedIndexChange)="changeTab($event)">
            <nz-tab nzTitle="Danh sách dữ liệu"> </nz-tab>
          </nz-tabset>
          <div class="lst-controls">
            <button
              nz-button
              type="button"
              class="btn btn-primary"
              (click)="handlerOpenDialog()"
            >
              <i class="isax-add-circle1 mr-2"></i>Thêm mới sản phẩm
            </button>
          </div>
        </div>

        <div class="card-body">
          <div class="table-responsive">
            <table class="table table-bordered table-hover">
              <thead>
                <tr>
                  <th class="text-center">Tên sản phẩm</th>
                  <th class="text-center">Hình ảnh</th>
                  <th class="text-center">Giá</th>
                  <th class="text-center">Thời hạn ngày</th>
                  <th class="text-center">Giảm giá</th>
                  <th class="text-center">Giá sau giảm</th>
                  <th class="text-center">Hành động</th>
                </tr>
              </thead>
              <tbody>
                <tr *ngFor="let item of listOfData">
                  <td class="text-center">{{ item.tenGoiTap }}</td>
                  <td class="text-center">
                    <img
                      style="
                        width: 150px;
                        height: 150px;
                        object-fit: cover;
                        border-radius: 15px;
                      "
                      class="img-product"
                      [src]="img_URl + item.hinhAnh"
                      alt="{{ item.tenGoiTap }}"
                    />
                  </td>
                  <td class="text-center">{{ item.gia | moneyPipe }}</td>
                  <td class="text-center">
                    {{ item.thoiHanNgay | labelValue: listThoiHanNgay }}
                  </td>
                  <td class="text-center">
                    {{ item.giamGia | labelValue: listGiamGia }}
                  </td>
                  <td class="text-center">
                    {{ item.giaSauGiam | moneyPipe }}
                  </td>
                  <td class="text-center">
                    <button
                      class="btn btn-custom btn-sm me-2"
                      (click)="handlerOpenDialog(item, 'view')"
                    >
                      <i class="fa-solid fa-eye"></i>
                    </button>

                    <button
                      class="btn btn-custom btn-sm me-2"
                      (click)="handlerOpenDialog(item, 'edit')"
                    >
                      <i class="fa-solid fa-pen-to-square"></i>
                    </button>
                    <button
                      class="btn btn-danger btn-sm"
                      (click)="deleteData(item.id)"
                    >
                      <i class="fa-solid fa-trash-can"></i>
                    </button>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
