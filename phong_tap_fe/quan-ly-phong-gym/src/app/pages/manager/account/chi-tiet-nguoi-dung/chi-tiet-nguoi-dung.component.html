<nz-tabset [(nzSelectedIndex)]="indexTab" class="popup-layout">
  <nz-tab class="title-layout" nzTitle="Thông tin">
    <ng-container *ngIf="!initForm">
      <nz-skeleton [nzParagraph]="{ rows: 10 }"></nz-skeleton>
    </ng-container>
    <ng-template nz-tab *ngTemplateOutlet="tab1"></ng-template>
  </nz-tab>
</nz-tabset>

<ng-template #tab1>
  <ng-container *ngIf="initForm">
    <form *ngIf="myForm" [formGroup]="myForm" (ngSubmit)="saveData()">
      <!-- PHẦN ẢNH ĐẠI DIỆN TRÒN GIỮA -->
      <div class="avatar-section">
        <div class="avatar-wrapper">
          <label for="hinhAnh" class="avatar-label">
            <div class="avatar-overlay" *ngIf="modalImg">
              <i class="fas fa-camera"></i>
            </div>

            <img
              *ngIf="previewUrl"
              [src]="previewUrl"
              alt="Avatar"
              class="avatar-image"
            />
          </label>
          <input
            type="file"
            id="hinhAnh"
            formControlName="hinhAnh"
            (change)="onFileSelected($event)"
            hidden
          />
        </div>
        <p class="change-photo-text mt-3">
          <a href="javascript:void(0)">Thay đổi ảnh</a>
        </p>
      </div>

      <!-- CÁC TRƯỜNG THÔNG TIN -->
      <div class="row">
        <div class="col-md-6">
          <label for="tenNguoiDung" class="form-label">Họ và tên</label>
          <input
            type="text"
            class="form-control"
            formControlName="tenNguoiDung"
            placeholder="Nguyễn Văn A"
          />
        </div>

        <div class="col-md-6">
          <label for="cccd" class="form-label">Căn cước công dân</label>
          <input type="text" class="form-control" formControlName="cccd" />
        </div>

        <div class="col-md-6">
          <label for="email" class="form-label">Email</label>
          <input
            type="email"
            class="form-control"
            formControlName="email"
            placeholder="abcd@example.com"
          />
        </div>

        <div class="col-md-6">
          <label for="soDienThoai" class="form-label">Số điện thoại</label>
          <input
            type="text"
            class="form-control"
            id="soDienThoai"
            formControlName="soDienThoai"
            placeholder="0901234567"
          />
        </div>

        <div class="col-md-6">
          <label for="diaChi" class="form-label">Địa chỉ</label>
          <input
            type="text"
            formControlName="diaChi"
            class="form-control"
            formControlName="diaChi"
          />
        </div>

        <div class="col-md-6">
          <label for="ngayVaoLam" class="form-label">Ngày vào làm</label>
          <input-date formControlName="ngayVaoLam"></input-date>
        </div>

        <div class="col-md-6">
          <label for="luong" class="form-label">Lương tháng</label>
          <div class="">
            <input-moneny formControlName="luong"></input-moneny>
          </div>
        </div>

        <div class="col-md-6">
          <label for="vaiTro" class="form-label">Chức vụ</label>
          <div class="">
            <input-select formControlName="vaiTro" [items]="listVaiTro" />
          </div>
        </div>
      </div>
    </form>
  </ng-container>
</ng-template>

<div class="list-button mt-4">
  <button
    nz-button
    type="button"
    class="btn btn-danger"
    (click)="closeDialog()"
  >
    <i class="isax-close-circle1 mr-2"></i>Đóng
  </button>

  <ng-container *ngIf="initForm">
    <button
      nz-button
      type="button"
      class="btn btn-primary"
      (click)="saveData()"
    >
      <i class="isax-add-circle1 mr-2"></i>Ghi
    </button>
  </ng-container>
</div>
