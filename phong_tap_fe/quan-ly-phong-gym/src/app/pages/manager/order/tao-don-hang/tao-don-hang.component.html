<nz-tabset [(nzSelectedIndex)]="indexTab" class="popup-layout">
  <nz-tab class="title-layout" nzTitle="Thông tin">
    <ng-container *ngIf="!initForm">
      <nz-skeleton [nzParagraph]="{ rows: 10 }"></nz-skeleton>
    </ng-container>
    <ng-template nz-tab *ngTemplateOutlet="tab1"></ng-template>
  </nz-tab>
</nz-tabset>

<ng-template #tab1>
  <ng-container *ngIf="initForm">
    <form *ngIf="myForm" [formGroup]="myForm" (ngSubmit)="saveData()">
      <div class="bg-display-flex">
        <!-- PHẦN ẢNH ĐẠI DIỆN TRÒN GIỮA -->
        <!-- <div class="avatar-section">
          <div class="avatar-wrapper">
            <label for="hinhAnh" class="avatar-label">
              <div class="avatar-overlay" *ngIf="modalImg">
                <i class="fas fa-camera"></i>
              </div>

              <img
                *ngIf="previewUrl"
                [src]="previewUrl"
                alt="Avatar"
                class="avatar-image"
              />
            </label>
            <input
              type="file"
              id="hinhAnh"
              formControlName="hinhAnh"
              (change)="onFileSelected($event)"
              hidden
            />
          </div>
        </div> -->

        <!-- CÁC TRƯỜNG THÔNG TIN -->
        <div class="row">
          <div class="col-md-6 mt-5">
            <button
              type="button"
              class="form-control btn-primary"
              (click)="chonKhachHang()"
            >
              Chọn khách hàng
            </button>
          </div>

          <div class="col-md-6 mt-5">
            <button
              type="button"
              class="form-control btn-primary"
              (click)="chonGoiTap()"
            >
              Chọn gói tập
            </button>
          </div>

          <div class="col-md-6">
            <label for="tenKhachHang" class="form-label">Tên khách hàng</label>
            <input
              type="text"
              class="form-control"
              formControlName="tenKhachHang"
              placeholder="Tên khách hàng"
            />
          </div>

          <div class="col-md-6">
            <label for="idGoiTap" class="form-label">Gói tập</label>
            <input-select-api
              formControlName="idGoiTap"
              [apiService]="productService"
            ></input-select-api>
          </div>

          <div class="col-md-6">
            <label for="email" class="form-label">Email</label>
            <input
              type="email"
              class="form-control"
              formControlName="email"
              placeholder="Email"
            />
          </div>

          <div class="col-md-6">
            <label for="gia" class="form-label">Giá</label>
            <input-moneny formControlName="gia"></input-moneny>
          </div>

          <div class="col-md-6">
            <label for="soDienThoai" class="form-label">Số điện thoại</label>
            <input
              type="text"
              class="form-control"
              formControlName="soDienThoai"
              placeholder="Số điện thoại"
            />
          </div>

          <div class="col-md-6">
            <label for="giamGia" class="form-label">Giảm giá</label>
            <input-select
              formControlName="giamGia"
              [items]="listGiamGia"
            ></input-select>
          </div>

          <div class="col-md-6">
            <label for="gia" class="form-label">Hình thức thanh toán</label>
            <input-select
              formControlName="hinhThucThanhToan"
              [items]="listHinhThucThanhToan"
            ></input-select>
          </div>

          <div class="col-md-6">
            <label for="giaSauGiam" class="form-label">Giá sau giảm</label>
            <input-moneny formControlName="giaSauGiam"></input-moneny>
          </div>

          <div class="col-md-6">
            <label for="soLuong" class="form-label">Số lượng</label>
            <input type="number" class="form-control" min="1" />
          </div>
        </div>
      </div>
    </form>
  </ng-container>
</ng-template>

<div class="list-button mt-4">
  <button
    nz-button
    type="button"
    class="btn btn-danger"
    (click)="closeDialog()"
  >
    <i class="isax-close-circle1 mr-2"></i>Đóng
  </button>

  <ng-container *ngIf="initForm">
    <button
      nz-button
      type="button"
      class="btn btn-primary"
      (click)="saveData()"
    >
      <i class="isax-add-circle1 mr-2"></i>Ghi
    </button>
  </ng-container>
</div>
