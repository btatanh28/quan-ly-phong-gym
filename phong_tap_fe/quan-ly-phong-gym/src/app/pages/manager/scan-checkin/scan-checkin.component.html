<div>
  <form *ngIf="formSearch" [formGroup]="formSearch" (ngSubmit)="checkInScan()">
    <div class="row">
      <div class="col-md-12 mb-3">
        <label for="qrCode" class="form-label">Quét mã thẻ tập</label>
        <input
          type="text"
          class="form-control"
          formControlName="qrCode"
          placeholder="Quét mã thẻ tập"
        />
      </div>

      <div *ngIf="qrResult" class="alert alert-success mt-4">
        ✅ Check-in thành công: {{ qrResult }}
      </div>
    </div>
  </form>
</div>

<div class="container d-flex justify-content-center align-items-center scan-bg">
  <div class="card scan-card text-center p-4">
    <h4 class="scan-title mb-3">📷 Scan QR Check-in</h4>

    <div class="scanner-box position-relative">
      <div id="reader"></div>

      <!-- scan line -->
      <div class="scan-line"></div>
    </div>

    <div *ngIf="scanResult" class="alert alert-success mt-4">
      ✅ Check-in thành công: {{ scanResult }}
    </div>
  </div>
</div>
