<div class="container">
  <!-- Header -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="h2 fw-bold text-primary">
      <i class="fas fa-chart-line"></i> Dashboard Doanh Thu
    </h1>

    <div class="d-flex align-items-end mt-2">
      <form *ngIf="formSearch" [formGroup]="formSearch" (ngSubmit)="getData()">
        <div class="row">
          <!-- Select Năm -->
          <div class="col-md-3 mb-3">
            <label class="form-label fw-medium text-muted small">Năm</label>
            <input type="text" formControlName="year" class="form-control" />
          </div>

          <!-- Select Tháng -->
          <div class="col-md-3 mb-3">
            <label class="form-label fw-medium text-muted small">Tháng</label>
            <input-select
              formControlName="month"
              [items]="listNgayThangNam"
            ></input-select>
          </div>

          <div class="list-button col-md-6 button-layout">
            <button type="submit" class="btn btn-primary">
              <i class="fas fa-filter"></i> Lọc
            </button>

            <button type="submit" class="btn btn-primary" (click)="onReset()">
              Làm mới
            </button>
          </div>

          <div class="col-md-3 button-layout"></div>
        </div>
      </form>
    </div>
  </div>

  <!-- Biểu đồ -->
  <div class="row g-4">
    <div class="col-lg-12">
      <div class="card border-0 shadow-sm">
        <div
          class="card-header d-flex justify-content-between align-items-center"
        >
          <h5 class="mb-0">Doanh thu theo ngày trong tháng</h5>
        </div>
        <div class="card-body">
          <canvas id="revenueChart" height="90"></canvas>
        </div>
      </div>
    </div>

    <!-- <div class="col-lg-4">

      </div>

  </div>

  <div
    class="lst-controls d-flex justify-content-center align-items-center mt-4 mb-4"
  >
    <button
      nz-button
      type="button"
      class="btn btn-primary d-flex justify-content-between align-items-center"
      (click)="exportExcel()"
    >
      Kết xuất
    </button>
  </div>

  <!-- Bảng chi tiết -->
  <div class="card border-0 shadow-sm mt-4">
    <div class="card-header d-flex justify-content-between align-items-center">
      <h5 class="mb-0">Chi tiết doanh thu theo gói tập</h5>
    </div>
    <div class="card-body">
      <div class="table-responsive">
        <table class="table table-bordered table-hover">
          <thead>
            <tr>
              <th class="text-center">Tên gói tập</th>
              <th class="text-center">Số lượng</th>
              <th class="text-center">Doanh thu</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let item of listOfData">
              <td class="text-center">{{ item.tenGoiTap }}</td>
              <td class="text-center">{{ item.soLuong }}</td>
              <td class="text-center">{{ item.tongTien | moneyPipe }}</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
